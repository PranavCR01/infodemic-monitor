[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[[services]]
name = "api"

[services.deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30

[[services]]
name = "worker"

[services.deploy]
startCommand = "celery -A app.worker.celery_app worker --concurrency=$CELERY_CONCURRENCY --loglevel=info"
